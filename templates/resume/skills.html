{% extends 'base/base.html' %}

{% block title %}Skills{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-3">Skills</h2>
    <p class="text-muted">Add your skills with optional descriptions.</p>

    <form method="post" action="{% url 'edit_skills' %}" id="skills-form">
        {% csrf_token %}

        <div id="skills-container">

            <!-- ✅ Skill Row -->
            <div class="row skill-entry mb-3">

                <div class="col-md-6">
                    <label>Skill</label>
                    <input type="text" name="skill_name_0" class="form-control" placeholder="e.g. Python" required>
                </div>

                <div class="col-md-6">
                    <label>Description (Optional)</label>
                    <input type="text" name="skill_desc_0" class="form-control" placeholder="e.g. Intermediate, 2 years">
                </div>

            </div>

        </div>

        <input type="hidden" name="skill_count" id="skill-count" value="1">

        <!-- ✅ Add Button -->
        <button type="button" class="btn btn-secondary mb-3" onclick="addSkill()">
            + Add Skill
        </button>

        <!-- ✅ Navigation -->
        <div class="d-flex justify-content-between">
            <a href="{% url 'edit_education' %}" class="btn btn-secondary">
                ← Back
            </a>
            <button type="submit" class="btn btn-primary">
                Save & Continue →
            </button>
        </div>

    </form>

</div>

<!-- ✅ JS for dynamic rows -->
<script>
let skillCount = 1;

function addSkill() {
    const container = document.getElementById('skills-container');

    const row = document.createElement('div');
    row.classList.add('row', 'skill-entry', 'mb-3');

    row.innerHTML = `
        <div class="col-md-6">
            <label>Skill</label>
            <input type="text" name="skill_name_${skillCount}" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label>Description (Optional)</label>
            <input type="text" name="skill_desc_${skillCount}" class="form-control">
        </div>
    `;

    container.appendChild(row);

    skillCount++;
    document.getElementById('skill-count').value = skillCount;
}
</script>

{% endblock %}
