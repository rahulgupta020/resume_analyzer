{% extends 'base/base.html' %}

{% block title %}Experience{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-3">Work Experience</h2>
    <p class="text-muted">Add your work experience details.</p>

    <form method="post" id="experience-form">
        {% csrf_token %}

        <!-- Hidden counter -->
        <input type="hidden" name="experience_count" id="experience_count" value="1">

        <div id="experience-container">

            <!-- Experience Card -->
            <div class="experience-entry border p-3 mb-3 rounded">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Job Title</label>
                        <input type="text" name="job_title_0" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Company</label>
                        <input type="text" name="employer_0" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Location</label>
                        <input type="text" name="location_0" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Start Month</label>
                        <input type="number" name="start_month_0" class="form-control" min="1" max="12">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Start Year</label>
                        <input type="number" name="start_year_0" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>End Month</label>
                        <input type="number" name="end_month_0" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>End Year</label>
                        <input type="number" name="end_year_0" class="form-control">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>
                            <input type="checkbox" name="currently_working_0">
                            Currently Working
                        </label>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Description</label>
                        <textarea name="description_0" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Skills Used</label>
                        <input type="text" name="skills_0" class="form-control">
                    </div>

                </div>

            </div>

        </div>

        <!-- Add Button -->
        <button type="button" class="btn btn-secondary mb-3" onclick="addExperience()">
            + Add More Experience
        </button>

        <!-- Navigation -->
        <div class="d-flex justify-content-between">
            <a href="{% url 'edit_summary' %}" class="btn btn-secondary">
                ← Back
            </a>

            <button type="submit" class="btn btn-primary">
                Save & Continue →
            </button>
        </div>

    </form>

</div>

<script>
let count = 1;

function addExperience() {
    const container = document.getElementById('experience-container');

    const newBlock = document.querySelector('.experience-entry').cloneNode(true);

    newBlock.querySelectorAll('input, textarea').forEach(el => {
        let name = el.name;
        if (name) {
            el.name = name.replace('_0', '_' + count);
            el.value = '';
        }
    });

    container.appendChild(newBlock);

    count++;
    document.getElementById('experience_count').value = count;
}
</script>

{% endblock %}
