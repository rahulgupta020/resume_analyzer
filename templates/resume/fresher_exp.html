{% extends "base/base.html" %}

{% block navbar %}
    {% include "base/navbar.html" %}
{% endblock %}

{% block page_layout %}

<h2>Select Your Experience Level</h2>

<form method="post">
    {% csrf_token %}

    <label>
        <input type="radio" name="type" value="fresher" required>
        Fresher
    </label>
    <br><br>

    <label>
        <input type="radio" name="type" value="experienced">
        Experienced
    </label>
    <br><br>

    <button type="submit">Continue</button>
</form>


{% endblock %}
