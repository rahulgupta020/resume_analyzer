{% extends 'base/base.html' %}
{% load static %}

{% block title %}Education{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-3">Education Details</h2>
    <p class="text-muted">Add your educational background.</p>

    <!-- ✅ FORM -->
<form method="post" action="{% url 'edit_education' %}" id="education-form">        {% csrf_token %}

        <div class="education-entry row">

            <div class="col-md-6 mb-3">
                <label>Degree</label>
                <input type="text" name="degree[]" class="form-control" placeholder="e.g. B.Tech" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Institution</label>
                <input type="text" name="institution[]" class="form-control" placeholder="e.g. XYZ University" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Location</label>
                <input type="text" name="location[]" class="form-control" placeholder="e.g. Pune" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Graduation Date</label>
                <input type="date" name="graduation_date[]" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>GPA (Optional)</label>
                <input type="number" name="gpa[]" step="0.01" class="form-control" placeholder="e.g. 8.5">
            </div>

            <div class="col-md-6 mb-3">
                <label>Coursework (Optional)</label>
                <input type="text" name="coursework[]" class="form-control" placeholder="DSA, DBMS">
            </div>

        </div>

        <!-- Add More Button -->
        <button type="button" class="btn btn-secondary mb-3" id="add-education">
            + Add Another Education
        </button>

        <!-- Navigation Buttons -->
        <div class="d-flex justify-content-between">

            <!-- Back -->
            <a href="{% url 'edit_experience' %}" class="btn btn-secondary">
                ← Back
            </a>

            <!-- Next -->
            <button type="submit" class="btn btn-primary">
                Save & Continue →
            </button>

        </div>

    </form>

</div>

<!-- JS -->
<script>
document.getElementById('add-education').addEventListener('click', function() {
    const form = document.getElementById('education-form');
    const entry = form.querySelector('.education-entry').cloneNode(true);

    // Clear inputs
    entry.querySelectorAll('input').forEach(input => input.value = '');

    form.insertBefore(entry, document.getElementById('add-education'));
});
</script>

{% endblock %}
